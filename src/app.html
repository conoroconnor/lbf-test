<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1"
    />
    <meta name="theme-color" content="#0A2540" />
    <meta name="description" content="Let's Boat — Trip Tracker for letsboat.club members." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Let's Boat" />
    <link rel="icon" href="%sveltekit.assets%/logo.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/icons/icon-192.png" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
    <link rel="stylesheet" href="%sveltekit.assets%/brand.css" />
    <title>Let's Boat — Trip Tracker</title>
    <script>
      (function (l) {
        if (l.search.indexOf('?/') === 0) {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) { return s.replace(/~and~/g, '&'); })
            .join('?');
          window.history.replaceState(null, '', l.pathname + decoded + l.hash);
        }
      })(window.location);
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
